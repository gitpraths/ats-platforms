name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_DB: ats_db
          POSTGRES_USER: ats_user
          POSTGRES_PASSWORD: ats_pass
        ports: ["5432:5432"]
        options: --health-cmd pg_isready --health-interval 5s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --workspace=packages/backend
      - run: npm test --workspace=packages/backend
        env:
          DATABASE_URL: postgresql://ats_user:ats_pass@localhost:5432/ats_db_test
          JWT_SECRET: test-secret
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci --workspace=packages/frontend
      - run: npm run build --workspace=packages/frontend
