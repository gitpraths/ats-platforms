version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    container_name: ats_postgres
    environment:
      POSTGRES_DB: ats_db
      POSTGRES_USER: ats_user
      POSTGRES_PASSWORD: ats_pass
    ports:
      - "5432:5432"
    volumes:
      - ats_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ats_user -d ats_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ats_postgres_data:
